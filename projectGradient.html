<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Grandient</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<section class="hero"> 
    <div class="btn-container">   
    <button id="myButton">button1</button>
    <button id="myButton2">button2</button>
    </div>
    <h2>Copy your code here</h2>
    <div class="copyCode">
        background-image: linear-gradient(to right, rgb(92,145,229),rgb(152,63,198))        
    </div>
</section>   
<script>
    let btn1 = document.getElementById("myButton");
    let btn2 = document.getElementById("myButton2");
    let copyDiv = document.querySelector(".copyCode");

    let rgb1 = "#000";
    let rgb2 = "#000";



    const hexValues = () => {
        let myHexavalues ="0123456789abcdef";
        let colors = "#";
        for (let i = 0; i < 6; i++) {
        colors = colors + myHexavalues[Math.floor(Math.random() * 16)];
        }
        return colors;
    }


    const handleButton1 = () => {
        rgb1 = hexValues();
        btn1.innerText = (rgb1);
        console.log(rgb1);
        document.body.style.backgroundImage = `linear-gradient(to right, ${rgb1},${rgb2})`;
        copyDiv.innerHTML = `background-image: linear-gradient(to right, ${rgb1},${rgb2})`
        
    };

    const handleButton2 = () => {
        rgb2 = hexValues();
        btn2.innerText = (rgb2);
        console.log(rgb2);
        document.body.style.backgroundImage = `linear-gradient(to right, ${rgb1},${rgb2})`;
        copyDiv.innerHTML = `background-image: linear-gradient(to right, ${rgb1},${rgb2})`
        
    };

    btn1.addEventListener('click',handleButton1);
    btn2.addEventListener('click',handleButton2);



</script> 
</body>
</html>
